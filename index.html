<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Редактор сценарію</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Courier New", Courier, monospace;
    background: #2b2b2b;
    color: #e8e8e8;
  }

  .editor-wrap {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 30px 20px 80px;
    position: relative;
  }
  .editor {
    width: 100%;
    max-width: 800px;
    min-height: calc(100vh - 60px);
    background: #fdfdfb;
    color: #1a1a1a;
    padding: 60px 80px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    outline: none;
    font-size: 15px;
    line-height: 1.6;
  }

  .floating-toolbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(30, 30, 30, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    z-index: 100;
    max-width: calc(100% - 40px);
    justify-content: center;
  }
  .floating-toolbar button {
    padding: 7px 12px;
    border: 1px solid #555;
    background: #3a3a3a;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 5px;
    transition: background .15s;
    white-space: nowrap;
  }
  .floating-toolbar button:hover { background: #555; }
  .floating-toolbar .active { background: #6b8e4e; border-color: #88b065; }

  /* Окрема панель експорту зліва */
  .export-panel {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    background: rgba(30, 30, 30, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    z-index: 100;
  }
  .export-panel button {
    padding: 8px 14px;
    border: 1px solid #5b82bc;
    background: #4a6fa5;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 5px;
    transition: background .15s;
    white-space: nowrap;
  }
  .export-panel button:hover { background: #5b82bc; }

  /* Панель проектів — право зверху */
  .projects-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    font-family: inherit;
  }
  .projects-toggle {
    padding: 8px 14px;
    border: 1px solid #555;
    background: rgba(30,30,30,.92);
    backdrop-filter: blur(8px);
    color: #e8e8e8;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    min-width: 180px;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .projects-toggle:hover { background: rgba(50,50,50,.95); }
  .projects-toggle::after { content: " ▾"; color: #888; }

  /* Система view */
  body[data-view="projects"] .floating-toolbar,
  body[data-view="projects"] .editor-wrap,
  body[data-view="projects"] .export-panel,
  body[data-view="projects"] .projects-panel,
  body[data-view="projects"] .format-hint,
  body[data-view="projects"] #view-editor,
  body[data-view="projects"] #view-login { display: none !important; }

  body[data-view="editor"] #view-projects,
  body[data-view="editor"] #view-login { display: none !important; }

  body[data-view="login"] .floating-toolbar,
  body[data-view="login"] .editor-wrap,
  body[data-view="login"] .export-panel,
  body[data-view="login"] .projects-panel,
  body[data-view="login"] .format-hint,
  body[data-view="login"] #view-editor,
  body[data-view="login"] #view-projects { display: none !important; }

  /* Login screen */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    padding: 40px 32px;
    background: #1f1f1f;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .login-card h1 {
    margin: 0 0 8px;
    font-weight: normal;
    font-size: 28px;
    color: #fff;
  }
  .login-card .subtitle {
    color: #999;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .login-card #gsiLoginButton {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }
  .login-card .footer-note {
    margin-top: 28px;
    font-size: 11px;
    color: #666;
    line-height: 1.5;
  }

  /* Галерея проектів */
  #view-projects {
    min-height: 100vh;
    padding: 40px 40px 80px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .gallery-header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: normal;
    color: #fff;
  }
  .gallery-header .count {
    font-size: 14px;
    color: #888;
    margin-left: 10px;
  }
  .gallery-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .gallery-actions button {
    padding: 10px 16px;
    border: 1px solid #555;
    background: #3a3a3a;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    white-space: nowrap;
  }
  .gallery-actions button:hover { background: #505050; }
  .gallery-actions button.danger { background: #7a3030; border-color: #a04040; color: #fff; }
  .gallery-actions button.danger:hover { background: #a04040; }

  .tiles {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .tile {
    background: #fdfdfb;
    color: #1a1a1a;
    border-radius: 8px;
    padding: 20px 22px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.3);
    transition: transform .15s, box-shadow .15s;
    position: relative;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: "Courier New", Courier, monospace;
  }
  .tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .tile.active {
    outline: 3px solid #88b065;
    outline-offset: -3px;
  }
  .tile .tile-title {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #1a1a1a;
    text-transform: uppercase;
    word-break: break-word;
  }
  .tile .tile-meta {
    font-size: 10px;
    color: #888;
    margin-bottom: 14px;
    border-bottom: 1px solid #e0e0e0;
    padding-bottom: 8px;
  }
  .tile .tile-preview {
    flex: 1;
    font-size: 9px;
    line-height: 1.4;
    color: #555;
    overflow: hidden;
    position: relative;
  }
  .tile .tile-preview::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, #fdfdfb);
    pointer-events: none;
  }
  .tile .tile-preview .scene-heading { font-weight: bold; text-transform: uppercase; margin: 4px 0; }
  .tile .tile-preview .character { font-weight: bold; text-transform: uppercase; margin-left: 30%; }
  .tile .tile-preview .dialogue { margin: 0 15% 0 10%; }
  .tile .tile-preview .parenthetical { font-style: italic; margin-left: 20%; color: #888; }
  .tile .tile-preview .action { margin: 3px 0; }

  .tile-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity .15s;
  }
  .tile:hover .tile-actions { opacity: 1; }
  .tile-actions .ico {
    background: rgba(0,0,0,.6);
    color: #fff;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    cursor: pointer;
  }
  .tile-actions .ico:hover { background: rgba(0,0,0,.85); }
  .tile-actions .ico.del:hover { background: #a04040; }

  .tile-new {
    background: rgba(255,255,255,.05);
    color: #888;
    border: 2px dashed #555;
    box-shadow: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .tile-new:hover {
    background: rgba(255,255,255,.08);
    border-color: #88b065;
    color: #88b065;
    transform: translateY(-3px);
  }
  .tile-new .big-plus {
    font-size: 48px;
    margin-bottom: 8px;
    font-weight: 300;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #666;
  }
  .empty-state h2 {
    font-weight: normal;
    margin: 0 0 12px;
  }

  /* Блок користувача */
  .user-block {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 10px;
  }
  .user-block img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.2);
  }
  .user-block .user-name {
    font-size: 13px;
    color: #bbb;
  }
  .user-block .signout {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
  }
  .user-block .signout:hover { color: #fff; border-color: #888; }
  #gsiButton { min-height: 40px; }

  /* Кастомні діалоги */
  .dlg-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .dlg-backdrop.open { display: flex; }
  .dlg {
    background: #1f1f1f;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    width: 100%;
    max-width: 440px;
    font-family: inherit;
    color: #e8e8e8;
    overflow: hidden;
  }
  .dlg-body { padding: 20px 22px 16px; }
  .dlg-title {
    font-size: 15px;
    margin: 0 0 12px;
    color: #fff;
  }
  .dlg-message {
    font-size: 13px;
    line-height: 1.5;
    color: #c8c8c8;
    white-space: pre-wrap;
  }
  .dlg-input {
    width: 100%;
    margin-top: 14px;
    padding: 10px 12px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .dlg-input:focus { border-color: #5b82bc; }
  .dlg-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 20px;
    background: #181818;
    border-top: 1px solid #333;
  }
  .dlg-btn {
    padding: 8px 18px;
    border: 1px solid #555;
    background: #3a3a3a;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    min-width: 80px;
  }
  .dlg-btn:hover { background: #505050; }
  .dlg-btn.primary { background: #4a6fa5; border-color: #5b82bc; color: #fff; }
  .dlg-btn.primary:hover { background: #5b82bc; }
  .dlg-btn.danger { background: #7a3030; border-color: #a04040; color: #fff; }
  .dlg-btn.danger:hover { background: #a04040; }

  .format-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 14px;
    background: rgba(30,30,30,.92);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px;
    font-size: 12px;
    color: #bbb;
    z-index: 100;
    pointer-events: none;
  }
  .format-hint b { color: #88b065; }
  .format-hint .tab { color: #e0b040; margin-left: 10px; }

  .suggestions {
    position: absolute;
    background: #1f1f1f;
    border: 1px solid #555;
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    min-width: 200px;
    max-width: 360px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    font-family: "Courier New", monospace;
    font-size: 13px;
  }
  .suggestions .item {
    padding: 7px 12px;
    color: #e8e8e8;
    cursor: pointer;
    border-bottom: 1px solid #333;
  }
  .suggestions .item:last-child { border-bottom: none; }
  .suggestions .item.selected { background: #4a6fa5; }
  .suggestions .item .kind {
    font-size: 10px;
    color: #888;
    margin-left: 8px;
  }
  .suggestions .item.selected .kind { color: #cde0f2; }

  .editor div[data-type] {
    min-height: 1.6em;
    transition: background-color .12s, box-shadow .12s;
    border-radius: 2px;
  }
  .editor div[data-type].is-active-block {
    background-color: rgba(136, 176, 101, .08);
    box-shadow: -3px 0 0 #88b065;
  }
  .editor .scene-heading { text-transform: uppercase; font-weight: bold; margin: 24px 0 12px; }
  .editor .action { margin: 12px 0; }
  .editor .character { text-transform: uppercase; font-weight: bold; margin: 20px 0 0 40%; }
  .editor .dialogue { margin: 4px 20% 12px 20%; }
  .editor .parenthetical { font-style: italic; margin: 2px 0 2px 30%; color: #444; }
  .editor .transition { text-transform: uppercase; font-weight: bold; text-align: right; margin: 16px 0; color: #6b3a3a; }
  .editor .cast-list { margin: 4px 0 12px 20%; font-weight: bold; color: #555; font-size: 14px; }
  .editor .shot { text-transform: uppercase; font-weight: bold; margin: 16px 0 4px; color: #3a5a8c; }
  .editor .super { text-align: center; font-style: italic; margin: 14px 10% 14px 10%; color: #6b5a2e; font-weight: bold; }
  .editor .montage { text-transform: uppercase; font-weight: bold; text-decoration: underline; margin: 20px 0 8px; }
  .editor .intercut { text-transform: uppercase; font-weight: bold; text-decoration: underline; margin: 20px 0 8px; color: #5a3a6b; }
  .editor .flashback { text-transform: uppercase; font-weight: bold; text-align: center; margin: 20px 0 8px; color: #8c5a3a; letter-spacing: 2px; }
  .editor .act-break { text-transform: uppercase; font-weight: bold; text-align: center; margin: 32px 0 16px; font-size: 18px; letter-spacing: 3px; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 12px 0; }

  .editor div[data-type]:empty::before,
  .editor div[data-type]:has(br:only-child)::before {
    content: attr(data-placeholder);
    color: #bbb;
    font-style: italic;
    pointer-events: none;
  }

  /* Чіп формату біля активного блока */
  .block-chip {
    position: absolute;
    z-index: 50;
    background: #1f1f1f;
    color: #e0e0e0;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: "Courier New", monospace;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
    user-select: none;
    white-space: nowrap;
    transition: opacity .12s, transform .12s;
    opacity: 0;
    transform: translateX(-4px);
    pointer-events: none;
  }
  .block-chip.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .block-chip:hover { background: #2a2a2a; border-color: #88b065; color: #fff; }
  .block-chip::after { content: " ▾"; color: #88b065; }

  .chip-menu {
    position: absolute;
    z-index: 51;
    background: #1f1f1f;
    border: 1px solid #555;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    min-width: 180px;
    overflow: hidden;
    display: none;
  }
  .chip-menu.open { display: block; }
  .chip-menu .opt {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid #2c2c2c;
  }
  .chip-menu .opt:last-child { border-bottom: none; }
  .chip-menu .opt:hover { background: #2a2a2a; }
  .chip-menu .opt.active { background: rgba(107,142,78,.2); color: #88b065; }
  .chip-menu .opt .hot {
    font-size: 9px;
    color: #777;
    margin-left: 12px;
  }
</style>
</head>
<body>

<div id="view-login">
  <div class="login-card">
    <h1>Редактор сценаріїв</h1>
    <p class="subtitle">Увійдіть через Google, щоб зберігати сценарії в хмарі та синхронізувати між пристроями.</p>
    <div id="gsiLoginButton"></div>
    <p class="footer-note">Ваші проекти зберігаються у вашому приватному сховищі.<br>Ніхто інший їх не бачить.</p>
  </div>
</div>

<div id="view-projects">
  <div class="gallery-header">
    <h1>Мої сценарії<span class="count" id="projectsCount"></span></h1>
    <div class="gallery-actions">
      <div class="user-block" id="userBlock" style="display:none">
        <img id="userAvatar" alt="">
        <span class="user-name" id="userName"></span>
        <button class="signout" id="btnSignOut">Вийти</button>
      </div>
      <div id="gsiButton"></div>
      <button id="btnImport">📥 Імпорт</button>
      <button id="btnExportAll">📤 Експорт усіх</button>
      <button class="danger" id="btnDeleteAll">🗑 Видалити все</button>
    </div>
  </div>
  <div class="tiles" id="tilesContainer"></div>
</div>

<div id="view-editor">
  <div class="export-panel">
    <button onclick="exportPDF()">💾 PDF</button>
    <button onclick="exportDOCX()">💾 Word</button>
  </div>

  <div class="projects-panel">
    <button class="projects-toggle" id="projectsToggle">Проект</button>
  </div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none">

<div class="dlg-backdrop" id="dlgBackdrop"><div class="dlg" id="dlgBox"></div></div>

<div class="floating-toolbar" id="toolbar">
  <button data-fmt="scene-heading" title="Місце та час (Ctrl+1)">МІСЦЕ/ЧАС</button>
  <button data-fmt="action" title="Опис дії (Ctrl+2)">Опис</button>
  <button data-fmt="character" title="Герой (Ctrl+3)">ГЕРОЙ</button>
  <button data-fmt="dialogue" title="Репліка (Ctrl+4)">Репліка</button>
  <button data-fmt="parenthetical" title="Ремарка (Ctrl+5)">(ремарка)</button>
  <button data-fmt="transition" title="Перехід (Ctrl+6)">ПЕРЕХІД</button>
  <button data-fmt="cast-list" title="Список ролей у сцені (Ctrl+7)">Ролі</button>
  <button data-fmt="shot" title="План/ракурс камери (Ctrl+8)">ПЛАН</button>
  <button data-fmt="super" title="Текст на екрані: ТИТР, SUPER (Ctrl+9)">ТИТР</button>
  <button data-fmt="montage" title="Монтажна послідовність">Монтаж</button>
  <button data-fmt="intercut" title="Паралельний монтаж / інтеркат">Інтеркат</button>
  <button data-fmt="flashback" title="Флешбек — маркер зміни часу">Флешбек</button>
  <button data-fmt="act-break" title="Акт / розділ">АКТ</button>
  <div class="sep" style="width:1px;background:#555;margin:0 4px"></div>
  <button id="btnReformat" title="Розбити поточний документ на абзаци за переносами рядків">⇅ Розбити</button>
</div>

<div class="editor-wrap">
  <div id="editor" class="editor" contenteditable="true" spellcheck="true"></div>
</div>

<div id="suggestions" class="suggestions" style="display:none"></div>

<div id="blockChip" class="block-chip"></div>
<div id="chipMenu" class="chip-menu"></div>

<div class="format-hint">Формат: <b id="hint">—</b><span class="tab">Tab — автопідказка</span></div>

<script>
const editor = document.getElementById('editor');
const hint = document.getElementById('hint');
const toolbar = document.getElementById('toolbar');
const suggBox = document.getElementById('suggestions');

// --- Кастомні діалоги (prompt / confirm / alert) ---
const dlgBackdrop = document.getElementById('dlgBackdrop');
const dlgBox = document.getElementById('dlgBox');

function showDialog({ title, message, input, inputValue, buttons }) {
  return new Promise((resolve) => {
    dlgBox.innerHTML = `
      <div class="dlg-body">
        ${title ? `<div class="dlg-title"></div>` : ''}
        ${message ? `<div class="dlg-message"></div>` : ''}
        ${input ? `<input type="text" class="dlg-input" />` : ''}
      </div>
      <div class="dlg-footer"></div>
    `;
    if (title) dlgBox.querySelector('.dlg-title').textContent = title;
    if (message) dlgBox.querySelector('.dlg-message').textContent = message;
    const footer = dlgBox.querySelector('.dlg-footer');
    const inputEl = dlgBox.querySelector('.dlg-input');
    if (inputEl) inputEl.value = inputValue || '';

    const finish = (value) => {
      dlgBackdrop.classList.remove('open');
      document.removeEventListener('keydown', onKey);
      resolve(value);
    };

    buttons.forEach((b) => {
      const btn = document.createElement('button');
      btn.className = 'dlg-btn' + (b.variant ? ' ' + b.variant : '');
      btn.textContent = b.label;
      btn.addEventListener('click', () => {
        if (b.value === 'INPUT') finish(inputEl ? inputEl.value : '');
        else finish(b.value);
      });
      footer.appendChild(btn);
    });

    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); finish(null); }
      else if (e.key === 'Enter' && (!inputEl || document.activeElement === inputEl)) {
        e.preventDefault();
        const primary = buttons.find((b) => b.variant === 'primary') || buttons[buttons.length-1];
        if (primary.value === 'INPUT') finish(inputEl ? inputEl.value : '');
        else finish(primary.value);
      }
    };
    document.addEventListener('keydown', onKey);

    dlgBackdrop.classList.add('open');
    if (inputEl) { inputEl.focus(); inputEl.select(); }
    else footer.lastChild.focus();
  });
}

function dlgAlert(message, title) {
  return showDialog({ title: title || 'Повідомлення', message, buttons: [
    { label: 'OK', value: true, variant: 'primary' },
  ]});
}

async function dlgConfirm(message, { title, okLabel = 'OK', cancelLabel = 'Скасувати', danger = false } = {}) {
  const res = await showDialog({ title: title || 'Підтвердження', message, buttons: [
    { label: cancelLabel, value: false },
    { label: okLabel, value: true, variant: danger ? 'danger' : 'primary' },
  ]});
  return res === true;
}

async function dlgPrompt(message, defaultValue = '', { title, okLabel = 'OK' } = {}) {
  const res = await showDialog({ title: title || 'Введіть значення', message, input: true, inputValue: defaultValue, buttons: [
    { label: 'Скасувати', value: null },
    { label: okLabel, value: 'INPUT', variant: 'primary' },
  ]});
  return res;
}

async function dlgChoice(message, choices, { title } = {}) {
  return showDialog({ title: title || 'Вибір', message, buttons: choices });
}

let audioCtx = null;
const KEY_BUFFERS = [];
let DING_BUFFER = null;

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function loadSound(url) {
  const ctx = ensureAudio();
  if (!ctx) return null;
  const res = await fetch(url);
  const arr = await res.arrayBuffer();
  return await ctx.decodeAudioData(arr);
}

async function preloadSounds() {
  try {
    const keys = await Promise.all(
      [1,2,3,4,5,6,7,8].map(n => loadSound(`sounds/key${n}.mp3`).catch(() => null))
    );
    for (const b of keys) if (b) KEY_BUFFERS.push(b);
    DING_BUFFER = await loadSound('sounds/ding.mp3').catch(() => null);
  } catch (e) { console.warn('Sound preload failed', e); }
}

function playBuffer(buf, opts = {}) {
  const ctx = ensureAudio();
  if (!ctx || !buf) return;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = opts.rate ?? 1;
  const gain = ctx.createGain();
  gain.gain.value = opts.volume ?? 1;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playKey() {
  if (!KEY_BUFFERS.length) return;
  const buf = KEY_BUFFERS[(Math.random() * KEY_BUFFERS.length) | 0];
  playBuffer(buf, { rate: 0.95 + Math.random() * 0.1, volume: 0.8 });
}

function playReturn() {
  playKey();
  if (DING_BUFFER) playBuffer(DING_BUFFER, { volume: 0.5 });
}

// Тригер звуку на друк
editor.addEventListener('keydown', (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;
  if (k === 'Enter') playReturn();
  else if (k === ' ' || k === 'Backspace' || k.length === 1) playKey();
});

function decodeJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const json = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(json);
}

// --- Cloud sync ---
async function apiFetch(path, options = {}) {
  if (!currentUser?.token) throw new Error('not_signed_in');
  // Перевіряємо термін дії токена локально щоб не робити зайвий запит (#4)
  try {
    const payload = decodeJwt(currentUser.token);
    if (payload.exp * 1000 < Date.now()) {
      console.warn('token expired, requesting silent re-auth');
      // Не вилогуємось одразу — даємо шанс синку при наступному вході
      throw new Error('token_expired');
    }
  } catch (e) {
    if (e.message === 'token_expired') throw e;
  }
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + currentUser.token,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (res.status === 401) {
    // Не викликаємо signOut() автоматично — це знищує робочий стан (#4)
    // Просто кидаємо помилку, наступний flushImmediate спробує ще раз
    throw new Error('unauthorized');
  }
  if (!res.ok) throw new Error('api_error_' + res.status);
  return res.json();
}

// Синхронізація: при логіні — зливаємо local та cloud
let syncInProgress = false;
async function syncFromCloud() {
  if (!currentUser || syncInProgress) return;
  syncInProgress = true;
  try {
    const remoteList = await cloudListProjects();
    // Завантажуємо нові/оновлені з клауду
    for (const [id, meta] of Object.entries(remoteList)) {
      // Перечитуємо local щоразу — користувач міг редагувати під час await (#2)
      const local = projects[id];
      const remoteUpdated = meta.updated || 0;
      const localUpdated = local?.updated || 0;
      if (local && localUpdated >= remoteUpdated) continue;

      try {
        const full = await cloudGetProject(id);
        // ПОВТОРНА перевірка перед записом — користувач міг встигнути натиснути клавішу (#2)
        const stillStale = !projects[id] || (projects[id].updated || 0) < (full.updated || 0);
        if (stillStale) {
          projects[id] = {
            name: full.name,
            content: full.content,
            dict: full.dict || { characters: {}, locations: {}, phrases: {} },
            updated: full.updated,
          };
          // Якщо це поточний відкритий проект — оновлюємо редактор (#3)
          if (id === activeId && document.body.getAttribute('data-view') === 'editor') {
            const sel = window.getSelection();
            const wasFocused = document.activeElement === editor;
            editor.innerHTML = full.content || '';
            if (typeof ensureAttrs === 'function') ensureAttrs();
            if (wasFocused) editor.focus();
          }
        }
      } catch (e) { console.warn('fetch fail', id, e); }
    }
    // Пушимо локальні що новіші або відсутні в клауді (з урахуванням tombstones #14)
    const tombs = loadTombstones();
    for (const [id, p] of Object.entries(projects)) {
      const remote = remoteList[id];
      if (tombs.has(id)) continue;  // не воскресати видалене
      if (!remote || (p.updated || 0) > (remote.updated || 0)) {
        try {
          await cloudSaveProject(id, p);
        } catch (e) { console.warn('push fail', id, e); }
      }
    }
    // Видаляємо локально те що видалено на іншому пристрої (відсутнє в клауді, але є локально без tombstone)
    // Поточний підхід: не видаляємо автоматично, лише попереджаємо tombstone про повторне завантаження
    saveProjects(projects);
    if (document.body.getAttribute('data-view') === 'projects') renderProjects();
  } catch (e) {
    console.warn('sync error', e);
  } finally {
    syncInProgress = false;
  }
}

// Дебаунс пуш у клауд — окремий таймер на кожен проект (#13)
const pushTimers = new Map();
function scheduleCloudPush(id) {
  if (!currentUser || !projects[id]) return;
  if (pushTimers.has(id)) clearTimeout(pushTimers.get(id));
  pushTimers.set(id, setTimeout(() => {
    pushTimers.delete(id);
    cloudSaveProject(id, projects[id]).catch(e => console.warn('push err', e));
  }, 1500));
}

// Негайний пуш (для важливих подій: close, signOut, create) — sendBeacon щоб гарантувати доставку (#1, #5)
function flushImmediate(id) {
  if (!currentUser || !projects[id]) return;
  if (pushTimers.has(id)) { clearTimeout(pushTimers.get(id)); pushTimers.delete(id); }
  const url = API_BASE + '/projects/' + id;
  const body = JSON.stringify(projects[id]);
  // Спроба через sendBeacon (працює навіть при закритті вкладки)
  if (navigator.sendBeacon) {
    const blob = new Blob([JSON.stringify({ ...projects[id], _token: currentUser.token })], { type: 'application/json' });
    navigator.sendBeacon(API_BASE + '/projects/' + id + '?beacon=1&token=' + encodeURIComponent(currentUser.token), blob);
  }
  // Дублюємо звичайним fetch (не блокуюче)
  fetch(url, {
    method: 'PUT',
    keepalive: true,
    headers: {
      'Authorization': 'Bearer ' + currentUser.token,
      'Content-Type': 'application/json',
    },
    body,
  }).catch(() => {});
}

function flushAll() {
  if (!currentUser) return;
  for (const id of Array.from(pushTimers.keys())) {
    flushImmediate(id);
  }
}

// Гарантований flush при закритті вкладки / навігації (#1)
window.addEventListener('pagehide', flushAll);
window.addEventListener('beforeunload', flushAll);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushAll();
});

// --- Проекти (прив'язані до користувача) ---
function projectsKey() { return currentUser ? `scenario_projects_${currentUser.sub}` : null; }
function activeKey() { return currentUser ? `scenario_active_${currentUser.sub}` : null; }

function loadProjects() {
  const key = projectsKey();
  if (!key) return {};
  try { return JSON.parse(localStorage.getItem(key) || '{}'); }
  catch { return {}; }
}
function saveProjects(p) {
  const key = projectsKey();
  if (!key) {
    // Аварійний фолбек якщо user вилогувався — пишемо під тимчасовим ключем
    try { localStorage.setItem('scenario_pending_save', JSON.stringify(p)); } catch {}
    return;
  }
  try {
    localStorage.setItem(key, JSON.stringify(p));
  } catch (e) {
    console.error('localStorage save failed', e);
    // Спробуємо хоча б у клауд через flush
    if (currentUser && activeId && p[activeId]) flushImmediate(activeId);
  }
}

// Tombstones для видалених на іншому пристрої (#14)
function tombstoneKey() { return currentUser ? `scenario_tombstones_${currentUser.sub}` : null; }
function loadTombstones() {
  const k = tombstoneKey();
  if (!k) return new Set();
  try { return new Set(JSON.parse(localStorage.getItem(k) || '[]')); } catch { return new Set(); }
}
function saveTombstones(set) {
  const k = tombstoneKey();
  if (!k) return;
  try { localStorage.setItem(k, JSON.stringify([...set])); } catch {}
}

let projects = loadProjects();
let activeId = currentUser ? localStorage.getItem(activeKey()) : null;
if (!activeId || !projects[activeId]) activeId = Object.keys(projects)[0] || null;

let dict = (activeId && projects[activeId]?.dict) || { characters: {}, locations: {}, phrases: {} };

// Витягує базове ім'я персонажа без анотацій (ЗК), (ПЗ), (V.O.) тощо
function baseCharacterName(name) {
  return name.replace(/\s*\((ЗК|ПЗ|ПРОД\.|V\.?O\.?|O\.?S\.?|CONT'?D|CONTINUED)\)\s*/gi, '').trim().toUpperCase();
}

function cleanCharacterDict() {
  const cleaned = {};
  for (const [name, count] of Object.entries(dict.characters)) {
    // Пропускаємо записи що виглядають як cast-list (кома + кілька імен)
    if (name.includes(',')) continue;
    const base = baseCharacterName(name);
    if (base && !base.includes(',')) cleaned[base] = (cleaned[base] || 0) + count;
  }
  dict.characters = cleaned;
}

function learnDict() {
  for (const b of editor.children) {
    if (b.nodeType !== 1) continue;
    const type = b.getAttribute('data-type');
    const text = b.textContent.trim();
    if (!text) continue;
    if (type === 'character') {
      const base = baseCharacterName(text);
      if (base && !base.includes(',')) dict.characters[base] = (dict.characters[base] || 0) + 1;
    } else if (type === 'scene-heading') {
      const m = text.match(/^(ІНТ\.|НАТ\.|ЕКСТ\.|ІНТ\.\/НАТ\.)\s*([^—–-]+)/i);
      if (m) {
        const loc = m[2].trim().toUpperCase();
        if (loc) dict.locations[loc] = (dict.locations[loc] || 0) + 1;
      }
    }
  }
  if (activeId && projects[activeId]) {
    projects[activeId].dict = dict;
    saveProjects(projects);
    if (currentUser) scheduleCloudPush(activeId); // #15
  }
}

editor.innerHTML = (activeId && projects[activeId]?.content) || '';

function ensureAttrs() {
  for (const b of editor.children) {
    if (b.nodeType !== 1) continue;
    let type = b.getAttribute('data-type');
    if (!type) {
      type = [...b.classList].find(c => PLACEHOLDERS[c]) || 'action';
      b.setAttribute('data-type', type);
      b.className = type;
    }
    b.setAttribute('data-placeholder', PLACEHOLDERS[type] || '');
  }
}
cleanCharacterDict();
if (activeId && projects[activeId]) { ensureAttrs(); learnDict(); }

function save() {
  if (!activeId || !projects[activeId]) return;
  // Не перетираємо контент якщо ми не на view редактора
  if (document.body.getAttribute('data-view') !== 'editor') return;
  // Не перетираємо якщо editor порожній а проект має контент (захист від випадкового стирання)
  const html = editor.innerHTML;
  if (!html.trim() && projects[activeId].content && projects[activeId].content.trim()) return;
  projects[activeId].content = html;
  projects[activeId].updated = Date.now();
  saveProjects(projects);
  if (currentUser) scheduleCloudPush(activeId);
}

const toggleBtn = document.getElementById('projectsToggle');
const tilesEl = document.getElementById('tilesContainer');
const countEl = document.getElementById('projectsCount');

function setView(name) {
  document.body.setAttribute('data-view', name);
  if (name === 'projects') renderProjects();
  if (typeof updateBlockChip === 'function') updateBlockChip();
}

function currentName() {
  return projects[activeId]?.name || 'Без назви';
}
function updateToggleLabel() {
  toggleBtn.textContent = '📄 ' + currentName();
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return 'сьогодні ' + d.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function countBlocks(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return [...tmp.children].filter(c => c.textContent.trim()).length;
}

function buildPreview(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  const frag = document.createDocumentFragment();
  let count = 0;
  for (const c of tmp.children) {
    if (count > 15) break;
    if (!c.textContent.trim()) continue;
    const d = document.createElement('div');
    d.className = c.className || '';
    d.textContent = c.textContent;
    frag.appendChild(d);
    count++;
  }
  return frag;
}

function renderProjects() {
  tilesEl.innerHTML = '';
  const entries = Object.entries(projects).sort((a,b) => (b[1].updated||0) - (a[1].updated||0));
  countEl.textContent = ' (' + entries.length + ')';

  // Tile "+ Новий"
  const newTile = document.createElement('div');
  newTile.className = 'tile tile-new';
  newTile.innerHTML = `<div class="big-plus">+</div><div>Новий сценарій</div>`;
  newTile.addEventListener('click', async () => {
    const name = await dlgPrompt('Назва нового проекту:', 'Новий сценарій', { title: 'Новий сценарій', okLabel: 'Створити' });
    if (name && name.trim()) {
      createProject(name.trim());
      setView('editor');
    }
  });
  tilesEl.appendChild(newTile);

  for (const [id, p] of entries) {
    const tile = document.createElement('div');
    tile.className = 'tile' + (id === activeId ? ' active' : '');

    const titleEl = document.createElement('div');
    titleEl.className = 'tile-title';
    titleEl.textContent = p.name;

    const metaEl = document.createElement('div');
    metaEl.className = 'tile-meta';
    const blocks = countBlocks(p.content || '');
    metaEl.textContent = `${blocks} блоків · ${fmtDate(p.updated)}`;

    const prev = document.createElement('div');
    prev.className = 'tile-preview';
    prev.appendChild(buildPreview(p.content));

    const actions = document.createElement('div');
    actions.className = 'tile-actions';
    actions.innerHTML = `
      <div class="ico rename" title="Перейменувати">✎</div>
      <div class="ico dup" title="Дублювати">⧉</div>
      <div class="ico del" title="Видалити">🗑</div>
    `;

    tile.appendChild(titleEl);
    tile.appendChild(metaEl);
    tile.appendChild(prev);
    tile.appendChild(actions);

    tile.addEventListener('click', (e) => {
      if (e.target.closest('.tile-actions')) return;
      switchProject(id);
      setView('editor');
    });

    actions.querySelector('.rename').addEventListener('click', async (e) => {
      e.stopPropagation();
      const nn = await dlgPrompt('Нова назва проекту:', p.name, { title: 'Перейменувати' });
      if (nn && nn.trim()) {
        p.name = nn.trim();
        p.updated = Date.now();
        saveProjects(projects);
        scheduleCloudPush(id); // #7
        renderProjects();
        updateToggleLabel();
      }
    });

    actions.querySelector('.dup').addEventListener('click', (e) => {
      e.stopPropagation();
      const newId = 'p_' + Date.now();
      projects[newId] = {
        name: p.name + ' (копія)',
        content: p.content,
        dict: JSON.parse(JSON.stringify(p.dict || {characters:{},locations:{},phrases:{}})),
        updated: Date.now(),
      };
      saveProjects(projects);
      scheduleCloudPush(newId); // #7/#8
      renderProjects();
    });

    actions.querySelector('.del').addEventListener('click', async (e) => {
      e.stopPropagation();
      const ok = await dlgConfirm(`Видалити проект «${p.name}»?\nЦю дію не можна скасувати.`, { title: 'Видалення', okLabel: 'Видалити', danger: true });
      if (!ok) return;
      delete projects[id];
      saveProjects(projects);
      // Записуємо tombstone щоб sync не воскресив (#14)
      const tombs = loadTombstones();
      tombs.add(id);
      saveTombstones(tombs);
      if (currentUser) cloudDeleteProject(id).catch(() => {});
      if (id === activeId) {
        activeId = null;
        if (activeKey()) localStorage.removeItem(activeKey());
        editor.innerHTML = '';
        updateToggleLabel();
      }
      renderProjects();
    });

    tilesEl.appendChild(tile);
  }
}

function switchProject(id) {
  if (!projects[id]) return;
  // Зберігаємо попередній проект ТІЛЬКИ якщо ми в редакторі
  if (document.body.getAttribute('data-view') === 'editor' && activeId && projects[activeId]) save();
  activeId = id;
  if (activeKey()) localStorage.setItem(activeKey(), activeId);
  dict = projects[activeId].dict || { characters: {}, locations: {}, phrases: {} };
  editor.innerHTML = projects[activeId].content || EMPTY_CONTENT;
  ensureAttrs();
  if (typeof hideSuggestions === 'function') hideSuggestions();
  updateToggleLabel();
  updateHint();
}

const importInput = document.getElementById('importFile');
document.getElementById('btnImport').addEventListener('click', () => importInput.click());
importInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.projects) throw new Error('Невірний формат');
      const choice = await dlgChoice(
        `Знайдено ${Object.keys(data.projects).length} проект(ів).\nЩо зробити з поточними ${Object.keys(projects).length}?`,
        [
          { label: 'Скасувати', value: 'cancel' },
          { label: 'Замінити', value: 'replace', variant: 'danger' },
          { label: 'Додати', value: 'merge', variant: 'primary' },
        ],
        { title: 'Імпорт проектів' }
      );
      if (choice === 'cancel' || !choice) return;
      // Sanitize id (#10): тільки безпечні символи, інакше регенеруємо
      const safeId = (id) => /^[\w.-]+$/.test(id) ? id : 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      if (choice === 'merge') {
        for (const [id, p] of Object.entries(data.projects)) {
          const newId = projects[id] ? 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) : safeId(id);
          projects[newId] = p;
          scheduleCloudPush(newId);
        }
      } else if (choice === 'replace') {
        const cleaned = {};
        for (const [id, p] of Object.entries(data.projects)) cleaned[safeId(id)] = p;
        projects = cleaned;
        activeId = data.activeId && projects[safeId(data.activeId)] ? safeId(data.activeId) : Object.keys(projects)[0];
        for (const id of Object.keys(projects)) scheduleCloudPush(id);
      }
      saveProjects(projects);
      if (activeId && projects[activeId]) switchProject(activeId);
      renderProjects();
    } catch (err) {
      dlgAlert('Помилка імпорту: ' + err.message, 'Помилка');
    }
  };
  reader.readAsText(file);
  importInput.value = '';
});

else if (activeId && projects[activeId]) setView('editor');
else setView('projects');

function getCurrentBlock() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  let node = sel.getRangeAt(0).startContainer;
  while (node && node !== editor) {
    if (node.nodeType === 1 && node.parentNode === editor) return node;
    node = node.parentNode;
  }
  return null;
}

function setBlockType(block, type) {
  // Захист: ніколи не міняємо тип у editor-контейнера
  if (!block || block === editor || !editor.contains(block) || block.parentNode !== editor) {
    console.warn('setBlockType: invalid target', block);
    return;
  }
  block.className = type;
  block.setAttribute('data-type', type);
  block.setAttribute('data-placeholder', PLACEHOLDERS[type] || '');
}

function setCaretToEnd(node) {
  const range = document.createRange();
  range.selectNodeContents(node);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function updateHint() {
  const b = getCurrentBlock();
  const type = b?.getAttribute('data-type');
  hint.textContent = LABELS[type] || '—';
  for (const btn of toolbar.querySelectorAll('button[data-fmt]')) {
    btn.classList.toggle('active', btn.dataset.fmt === type);
  }
}

let currentSuggestions = [];
let selectedIdx = 0;

function hideSuggestions() {
  suggBox.style.display = 'none';
  currentSuggestions = [];
}

function showSuggestions(items, block) {
  if (!items.length) { hideSuggestions(); return; }
  currentSuggestions = items;
  selectedIdx = 0;
  renderSuggestions();
  const rect = block.getBoundingClientRect();
  suggBox.style.left = (rect.left + window.scrollX) + 'px';
  suggBox.style.display = 'block';
  // Перевіряємо чи вистачає місця знизу
  const boxH = suggBox.offsetHeight;
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow < boxH + 8 && rect.top > boxH + 8) {
    suggBox.style.top = (rect.top + window.scrollY - boxH - 4) + 'px';
  } else {
    suggBox.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  }
}

function renderSuggestions() {
  suggBox.innerHTML = '';
  currentSuggestions.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'item' + (i === selectedIdx ? ' selected' : '');
    el.innerHTML = `${s.label || s.value}<span class="kind">${s.kind || ''}</span>`;
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      applySuggestion(s);
    });
    suggBox.appendChild(el);
  });
}

function applySuggestion(s) {
  const block = getCurrentBlock();
  if (!block) return;
  if (s.setType) setBlockType(block, s.setType);
  block.textContent = s.value;
  setCaretToEnd(block);
  hideSuggestions();
  save();
  updateHint();
}

function buildSuggestions(block) {
  const type = block.getAttribute('data-type') || 'action';
  const text = block.textContent.trim();
  const lower = text.toLowerCase();
  const upper = text.toUpperCase();
  const items = [];

  if (type === 'scene-heading' || type === 'action') {
    const hasPrefix = /^(ІНТ\.|НАТ\.|ЕКСТ\.|ІНТ\.\/НАТ\.)/i.test(text);

    // Префікси — лише коли префіксу ще нема
    if (!hasPrefix) {
      for (const p of SCENE_PREFIXES) {
        if (p.match.some(m => lower.startsWith(m))) {
          items.push({
            value: p.expand, label: p.label + ' →', kind: 'префікс',
            setType: 'scene-heading',
          });
        } else if (!text && type === 'scene-heading') {
          items.push({
            value: p.expand, label: p.label, kind: 'префікс',
            setType: 'scene-heading',
          });
        }
      }
    }

    if (hasPrefix) {
      const hasDash = /[—–-]/.test(text);
      if (hasDash) {
        // Після тире — підказуємо час
        const afterDash = text.split(/[—–-]/).pop().trim().toUpperCase();
        const base = text.replace(/[—–-]\s*.*$/, '— ');
        for (const t of TIME_OF_DAY) {
          if (!afterDash || t.startsWith(afterDash)) {
            items.push({ value: base + t, label: t, kind: 'час' });
          }
        }
      } else {
        // До тире — підказуємо локації
        const locSorted = Object.entries(dict.locations).sort((a,b) => b[1]-a[1]);
        const pref = text.replace(/^(ІНТ\.|НАТ\.|ЕКСТ\.|ІНТ\.\/НАТ\.)\s*/i, '').toUpperCase().trim();
        const prefixMatch = text.match(/^(ІНТ\.|НАТ\.|ЕКСТ\.|ІНТ\.\/НАТ\.)\s*/i)?.[0] || '';
        for (const [loc, _] of locSorted) {
          if (loc.startsWith(pref) && loc !== pref) {
            items.push({ value: prefixMatch + loc + ' — ', label: loc, kind: 'місце' });
          }
        }
        if (pref) {
          items.push({ value: prefixMatch + pref + ' — ', label: pref + ' — (додати тире)', kind: 'тире' });
        }
      }
    }
  }

  if (type === 'character') {
    const typed = text.toUpperCase().trim();
    const typedBase = baseCharacterName(typed);
    const names = Object.entries(dict.characters).sort((a,b) => b[1]-a[1]);
    const hasOpenParen = /\(\s*$/.test(typed);
    // Якщо ім'я вже має закриту анотацію — нічого не пропонуємо, воно завершене
    const hasClosedAnnotation = /\((ЗК|ПЗ|ПРОД\.|V\.?O\.?|O\.?S\.?|CONT'?D)\)\s*$/i.test(typed);
    if (hasClosedAnnotation) return items;
    // Якщо текст точно збігається з відомим персонажем — теж не пропонуємо
    if (names.some(([n]) => n === typed)) return items;

    if (hasOpenParen) {
      const nameBeforeParen = typed.replace(/\s*\(\s*$/, '');
      const ANNS = [
        ['ЗК', 'закадровий голос'],
        ['ПЗ', 'позакадровий (не в кадрі)'],
        ['ПРОД.', 'продовження репліки'],
      ];
      for (const [ann, desc] of ANNS) {
        items.push({ value: nameBeforeParen + ' (' + ann + ')', label: '(' + ann + ')', kind: desc });
      }
    } else {
      // Тільки базові імена
      for (const [name, _] of names) {
        if (!typedBase || name.startsWith(typedBase)) {
          if (name === typed) continue;
          items.push({ value: name, label: name, kind: 'герой' });
        }
      }
    }
  }

  if (type === 'parenthetical') {
    for (const p of PARENTHETICALS) {
      if (!text || p.toLowerCase().startsWith(lower)) {
        items.push({ value: p, label: p, kind: 'ремарка' });
      }
    }
  }

  if (type === 'transition') {
    for (const t of TRANSITIONS) {
      if (!upper || t.startsWith(upper)) {
        items.push({ value: t, label: t, kind: 'перехід' });
      }
    }
  }

  if (type === 'action') {
    for (const p of SCENE_PREFIXES) {
      if (p.match.some(m => lower.startsWith(m))) {
        items.unshift({
          value: p.expand, label: '→ ' + p.label + ' (зробити МІСЦЕ/ЧАС)', kind: 'формат',
          setType: 'scene-heading',
        });
      }
    }
  }

  return items.slice(0, 8);
}

// --- Автовизначення типу блока за текстом ---
function detectBlockType(text, nextLine) {
  const t = text.trim();
  if (!t) return 'action';
  if (/^(ІНТ\.?|НАТ\.?|ЕКСТ\.?|INT\.?|EXT\.?|ИНТ\.?|ЭКСТ\.?)/i.test(t)) return 'scene-heading';
  if (/^(ПЕРЕХІД|ЗАТЕМНЕННЯ|ІЗ ЗАТЕМНЕННЯ|РІЗКО|НАПЛИВ|FADE|CUT TO|DISSOLVE)/i.test(t)) return 'transition';
  if (/^(МОНТАЖ|MONTAGE|СЕРІЯ ПЛАНІВ|SERIES OF SHOTS)/i.test(t)) return 'montage';
  if (/^(ІНТЕРКАТ|INTERCUT)/i.test(t)) return 'intercut';
  if (/^(ПОЧАТОК ФЛЕШБЕКУ|КІНЕЦЬ ФЛЕШБЕКУ|BEGIN FLASHBACK|END FLASHBACK|FLASHBACK)/i.test(t)) return 'flashback';
  if (/^(АКТ |ACT )/i.test(t)) return 'act-break';
  if (/^(ТИТР|SUPER|CHYRON|TITLE|CAPTION)\s*[:\-]/i.test(t)) return 'super';
  if (/^(КРУПНИЙ ПЛАН|ЗАГАЛЬНИЙ ПЛАН|СЕРЕДНІЙ ПЛАН|CLOSE UP|WIDE SHOT|POV|ANGLE ON|INSERT|РАКУРС)/i.test(t)) return 'shot';
  if (/^\(.+\)$/.test(t) && t.length < 60) return 'parenthetical';
  // Герой: ALL CAPS (класичний)
  if (/^[А-ЯЁІЇЄҐA-Z][А-ЯЁІЇЄҐA-Z\s,\.\-''()0-9]{0,40}$/u.test(t) && !/[а-яёa-z]/u.test(t) && t.length < 50) {
    // Якщо є кома і 2+ імені з віком — це список ролей, не герой
    if (/,/.test(t) && /\(\d+\)/.test(t)) return 'cast-list';
    return 'character';
  }
  // Герой: коротке ім'я 1-3 слова + наступний рядок = репліка
  if (t.length < 35 && /^[А-ЯЁІЇЄҐа-яёіїєґA-Za-z][\wА-ЯЁІЇЄҐа-яёіїєґ''()\s,.-]{0,30}$/u.test(t)) {
    const wordCount = t.split(/\s+/).length;
    if (wordCount <= 3 && nextLine && nextLine.trim().length > t.length) {
      return 'character';
    }
  }
  return 'action';
}

// --- Розбиття великого блока на окремі ---
function splitBlocksFromText(text) {
  // Розбиваємо за порожніми рядками (подвійний \n) як основний роздільник абзаців
  // Одинарний \n всередині абзацу зберігаємо як окремі блоки тільки якщо рядок — non-action
  const rawLines = text.split(/\n/).map(l => l.trim());
  // Групуємо по абзацах (через порожні рядки)
  const paragraphs = [];
  let current = [];
  for (const line of rawLines) {
    if (line === '') {
      if (current.length) { paragraphs.push(current); current = []; }
    } else {
      current.push(line);
    }
  }
  if (current.length) paragraphs.push(current);

  const blocks = [];
  for (const para of paragraphs) {
    if (para.length === 1) {
      const type = detectBlockType(para[0], null);
      blocks.push({ type, text: para[0] });
    } else {
      // Кілька рядків в одному абзаці — розбиваємо по рядках з контекстом
      for (let i = 0; i < para.length; i++) {
        const nextLine = i + 1 < para.length ? para[i + 1] : null;
        const type = detectBlockType(para[i], nextLine);
        blocks.push({ type, text: para[i] });
      }
    }
  }
  return blocks;
}

function reformatEditorContent() {
  const lines = [];
  for (const child of editor.children) {
    if (child.nodeType !== 1) continue;
    // textContent з блока + штучний перенос
    const html = child.innerHTML;
    // Перетворюємо <br> у \n
    const text = html.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
    const decoded = (() => { const d = document.createElement('div'); d.innerHTML = text; return d.textContent; })();
    lines.push(...decoded.split(/\n/));
  }
  const blocks = splitBlocksFromText(lines.join('\n'));
  if (!blocks.length) return;
  editor.innerHTML = '';
  for (const b of blocks) {
    const div = document.createElement('div');
    div.className = b.type;
    div.setAttribute('data-type', b.type);
    div.setAttribute('data-placeholder', PLACEHOLDERS[b.type] || '');
    div.textContent = b.text;
    editor.appendChild(div);
  }
  save();
  updateHint();
  updateBlockChip();
}

document.getElementById('btnReformat').addEventListener('click', async () => {
  const choice = await dlgChoice(
    'Як розбити поточний документ на абзаци?',
    [
      { label: 'Скасувати', value: 'cancel' },
      { label: 'Авто (за рядками)', value: 'auto' },
      { label: 'AI (Grok)', value: 'ai', variant: 'primary' },
    ],
    { title: 'Розбити на абзаци' }
  );
  if (choice === 'auto') reformatEditorContent();
  else if (choice === 'ai') aiReformatContent();
});

async function aiReformatContent() {
  if (!currentUser?.token) { await dlgAlert('Увійдіть щоб використовувати AI', 'Помилка'); return; }
  const lines = [];
  for (const child of editor.children) {
    if (child.nodeType !== 1) continue;
    const html = child.innerHTML;
    const text = html.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
    const decoded = (() => { const d = document.createElement('div'); d.innerHTML = text; return d.textContent; })();
    lines.push(...decoded.split(/\n/));
  }
  const fullText = lines.join('\n');
  if (!fullText.trim()) { await dlgAlert('Документ порожній', 'Помилка'); return; }

  const btn = document.getElementById('btnReformat');
  const origText = btn.textContent;
  btn.textContent = '  AI аналізує...';
  btn.disabled = true;

  try {
    const res = await fetch(API_BASE + '/reformat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + currentUser.token,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ text: fullText }),
    });
    const data = await res.json();
    if (!res.ok || !data.blocks) {
      const detail = data.detail || '';
      throw new Error((data.error || 'AI error') + (detail ? '\n' + detail : ''));
    }

    editor.innerHTML = '';
    for (const b of data.blocks) {
      const div = document.createElement('div');
      div.className = b.type;
      div.setAttribute('data-type', b.type);
      div.setAttribute('data-placeholder', PLACEHOLDERS[b.type] || '');
      div.textContent = b.text;
      editor.appendChild(div);
    }
    save();
    updateHint();
    if (typeof updateBlockChip === 'function') updateBlockChip();
  } catch (e) {
    console.error('AI reformat error', e);
    if (e.message.includes('invalid_token') || e.message.includes('unauthorized') || e.message.includes('token_expired')) {
      const ok = await dlgConfirm('Сесія закінчилась. Перелогінитись?', { title: 'Потрібна авторизація', okLabel: 'Увійти знову' });
      if (ok) {
        signOut();
        // Google One Tap auto-prompts on login screen
      }
    } else {
      await dlgAlert('Помилка AI: ' + e.message, 'Помилка');
    }
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// --- Розумна вставка з буфера ---
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  const cd = e.clipboardData || window.clipboardData;
  let text = cd.getData('text/plain');
  // Фолбек: якщо plain пустий — витягуємо з html
  if (!text) {
    const html = cd.getData('text/html');
    if (html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      text = tmp.innerText || tmp.textContent || '';
    }
  }
  if (!text) return;

  // Рахуємо реальні непорожні рядки
  const nonEmpty = text.split(/\r?\n/).filter(l => l.trim()).length;
  if (nonEmpty <= 1) {
    document.execCommand('insertText', false, text.trim());
    return;
  }

  const blocks = splitBlocksFromText(text);
  if (!blocks.length) return;

  let insertAfter = getCurrentBlock() || editor.lastElementChild;
  // Якщо поточний блок порожній — перевикористовуємо його
  if (insertAfter && !insertAfter.textContent.trim() && blocks.length > 0) {
    const first = blocks.shift();
    if (first) {
      setBlockType(insertAfter, first.type);
      insertAfter.textContent = first.text;
    }
  }
  for (const b of blocks) {
    const div = document.createElement('div');
    div.className = b.type;
    div.setAttribute('data-type', b.type);
    div.setAttribute('data-placeholder', PLACEHOLDERS[b.type] || '');
    div.textContent = b.text;
    if (insertAfter && insertAfter.parentNode === editor) insertAfter.after(div);
    else editor.appendChild(div);
    insertAfter = div;
  }
  if (insertAfter) setCaretToEnd(insertAfter);
  save();
  updateHint();
  updateBlockChip();
});

// mousedown + preventDefault — щоб клік кнопки не забирав фокус з редактора
toolbar.addEventListener('mousedown', (e) => {
  const btn = e.target.closest('button[data-fmt]');
  if (!btn) return;
  e.preventDefault();
  const type = btn.dataset.fmt;
  let block = getCurrentBlock();
  if (!block) {
    // якщо в редакторі нема каретки — беремо останній блок або створюємо
    block = editor.lastElementChild;
    if (!block) {
      block = document.createElement('div');
      editor.appendChild(block);
    }
  }
  setBlockType(block, type);
  setCaretToEnd(block);
  editor.focus();
  save();
  updateHint();
  updateBlockChip();
});

editor.addEventListener('keydown', (e) => {
  if (suggBox.style.display === 'block' && currentSuggestions.length) {
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = (selectedIdx + 1) % currentSuggestions.length; renderSuggestions(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = (selectedIdx - 1 + currentSuggestions.length) % currentSuggestions.length; renderSuggestions(); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); applySuggestion(currentSuggestions[selectedIdx]); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideSuggestions(); return; }
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const block = getCurrentBlock();
    if (!block) return;
    const blockText = block.textContent.trim();
    const curType = block.getAttribute('data-type') || 'action';

    // Якщо блок порожній — Tab перемикає тип (цикл)
    if (!blockText && TAB_CYCLE[curType]) {
      setBlockType(block, TAB_CYCLE[curType]);
      updateHint();
      updateBlockChip();
      return;
    }

    // Якщо є текст — показуємо автопідказки
    const items = buildSuggestions(block);
    if (items.length) {
      showSuggestions(items, block);
    }
    return;
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    const block = getCurrentBlock();
    if (!block) return;
    e.preventDefault();
    learnDict();
    const curType = block.getAttribute('data-type') || 'action';
    const nextType = NEXT_AFTER[curType] || 'action';
    const newDiv = document.createElement('div');
    newDiv.innerHTML = '<br>';
    block.after(newDiv);           // спочатку в DOM
    setBlockType(newDiv, nextType); // потім тип (guard вимагає що блок в editor)
    setCaretToEnd(newDiv);
    save();
    updateHint();
  }
});

editor.addEventListener('input', () => {
  save();
  updateHint();
  const block = getCurrentBlock();
  if (!block) { hideSuggestions(); return; }
  const text = block.textContent.trim();
  const type = block.getAttribute('data-type');
  if (!text && type !== 'scene-heading' && type !== 'transition' && type !== 'parenthetical') {
    hideSuggestions();
    return;
  }
  const items = buildSuggestions(block);
  if (items.length) showSuggestions(items, block);
  else hideSuggestions();
});

document.addEventListener('selectionchange', () => { updateHint(); updateBlockChip(); });
document.addEventListener('mousedown', (e) => {
  if (!suggBox.contains(e.target)) hideSuggestions();
});

// --- Block chip (швидка зміна типу абзацу) ---
const FORMAT_ORDER = ['scene-heading', 'cast-list', 'action', 'character', 'dialogue', 'parenthetical', 'transition', 'shot', 'super', 'montage', 'intercut', 'flashback', 'act-break'];
const HOTKEY_LABEL = { 'scene-heading':'⌘1','action':'⌘2','character':'⌘3','dialogue':'⌘4','parenthetical':'⌘5','transition':'⌘6','cast-list':'⌘7','shot':'⌘8','super':'⌘9' };

function getChipEls() {
  return {
    chip: document.getElementById('blockChip'),
    menu: document.getElementById('chipMenu'),
  };
}

function updateBlockChip() {
  const { chip: blockChip, menu: chipMenu } = getChipEls();
  if (!blockChip || !chipMenu) return;
  const block = getCurrentBlock();
  // Очищаємо попередню підсвітку
  for (const el of editor.querySelectorAll('.is-active-block')) el.classList.remove('is-active-block');
  if (!block || document.body.getAttribute('data-view') !== 'editor') {
    blockChip.classList.remove('visible');
    chipMenu.classList.remove('open');
    return;
  }
  // Підсвічуємо активний блок
  block.classList.add('is-active-block');
  const type = block.getAttribute('data-type') || 'action';
  blockChip.textContent = LABELS[type] || type;
  blockChip.dataset.type = type;
  // Позиціонуємо ліворуч від блока
  const rect = block.getBoundingClientRect();
  const editorRect = editor.getBoundingClientRect();
  const left = editorRect.left + window.scrollX - 4;
  const top = rect.top + window.scrollY + (rect.height / 2) - 12;
  blockChip.style.left = (left - blockChip.offsetWidth) + 'px';
  blockChip.style.top = top + 'px';
  blockChip.classList.add('visible');
  // Якщо меню відкрите — переставимо
  if (chipMenu.classList.contains('open')) positionChipMenu();
}

function positionChipMenu() {
  const { chip: blockChip, menu: chipMenu } = getChipEls();
  if (!blockChip || !chipMenu) return;
  const rect = blockChip.getBoundingClientRect();
  chipMenu.style.left = (rect.left + window.scrollX) + 'px';
  chipMenu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
}

function renderChipMenu(currentType) {
  const { menu: chipMenu } = getChipEls();
  if (!chipMenu) return;
  chipMenu.innerHTML = '';
  for (const t of FORMAT_ORDER) {
    const opt = document.createElement('div');
    opt.className = 'opt' + (t === currentType ? ' active' : '');
    opt.innerHTML = `<span></span><span class="hot"></span>`;
    opt.children[0].textContent = LABELS[t];
    opt.children[1].textContent = HOTKEY_LABEL[t] || '';
    opt.addEventListener('mousedown', (e) => {
      e.preventDefault();
      // Беремо збережений блок (фокус міг втратитись)
      const block = savedBlockForChip || getCurrentBlock();
      if (block && block !== editor && editor.contains(block)) {
        setBlockType(block, t);
        // Повертаємо каретку в кінець блока
        setCaretToEnd(block);
        editor.focus();
        save();
        updateHint();
        updateBlockChip();
      }
      chipMenu.classList.remove('open');
      savedBlockForChip = null;
    });
    chipMenu.appendChild(opt);
  }
}

// Збережений активний блок (на випадок втрати фокусу при кліку на чіп)
let savedBlockForChip = null;

document.getElementById('blockChip').addEventListener('mousedown', (e) => {
  e.preventDefault(); // не забираємо фокус з редактора
  e.stopPropagation();
  // Запам'ятовуємо активний блок ДО того як могли втратити селекцію
  savedBlockForChip = getCurrentBlock();
  const { chip: blockChip, menu: chipMenu } = getChipEls();
  if (chipMenu.classList.contains('open')) {
    chipMenu.classList.remove('open');
    return;
  }
  renderChipMenu(blockChip.dataset.type);
  positionChipMenu();
  chipMenu.classList.add('open');
});

document.addEventListener('mousedown', (e) => {
  const { chip: blockChip, menu: chipMenu } = getChipEls();
  if (!chipMenu) return;
  if (!chipMenu.contains(e.target) && e.target !== blockChip) {
    chipMenu.classList.remove('open');
  }
});

// При прокрутці/ресайзі — переоблачуємо
window.addEventListener('scroll', () => updateBlockChip(), true);
window.addEventListener('resize', () => updateBlockChip());

const HOTKEYS = { '1':'scene-heading','2':'action','3':'character','4':'dialogue','5':'parenthetical','6':'transition','7':'cast-list','8':'shot','9':'super' };
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && HOTKEYS[e.key]) {
    e.preventDefault();
    const block = getCurrentBlock();
    if (block) { setBlockType(block, HOTKEYS[e.key]); save(); updateHint(); }
  }
});

function exportPDF() {
  // Рендер HTML → PDF через html2pdf (підтримує кирилицю)
  const container = document.createElement('div');
  container.style.cssText = `
    font-family: 'Courier New', Courier, monospace;
    font-size: 12pt;
    line-height: 1.5;
    color: #000;
    background: #fff;
    padding: 60pt 72pt;
    width: 210mm;
    box-sizing: border-box;
  `;
  container.innerHTML = `<style>
    .scene-heading { text-transform: uppercase; font-weight: bold; margin: 18pt 0 8pt; }
    .action { margin: 8pt 0; }
    .character { text-transform: uppercase; font-weight: bold; margin: 14pt 0 0 35%; }
    .dialogue { margin: 2pt 20% 8pt 15%; }
    .parenthetical { font-style: italic; margin: 2pt 0 2pt 25%; }
    .transition { text-transform: uppercase; font-weight: bold; text-align: right; margin: 12pt 0; }
  </style>` + editor.innerHTML;

  document.body.appendChild(container);
  html2pdf()
    .set({
      margin: 0,
      filename: 'сценарій.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
    })
    .from(container)
    .save()
    .then(() => container.remove())
    .catch((err) => { console.error(err); container.remove(); });
}

function exportDOCX() {
  const content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
body { font-family: 'Courier New', monospace; font-size: 12pt; }
.scene-heading { text-transform: uppercase; font-weight: bold; margin: 18pt 0 8pt; }
.action { margin: 8pt 0; }
.character { text-transform: uppercase; font-weight: bold; margin: 14pt 0 0 35%; }
.dialogue { margin: 2pt 20% 8pt 15%; }
.parenthetical { font-style: italic; margin: 2pt 0 2pt 25%; }
.transition { text-transform: uppercase; font-weight: bold; text-align: right; margin: 12pt 0; }
</style></head><body>${editor.innerHTML}</body></html>`;
  const blob = htmlDocx.asBlob(content);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'сценарій.docx'; a.click();
  URL.revokeObjectURL(url);
}
